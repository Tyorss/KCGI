    async function downloadElementPng(element, fileName) {
      if (!window.html2canvas) {
        alert("html2canvas 라이브러리가 로드되지 않아 PNG를 생성할 수 없습니다.");
        return;
      }
      const canvas = await html2canvas(element, { backgroundColor: "#ffffff", scale: PNG_SCALE, useCORS: true });
      const link = document.createElement("a");
      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function downloadSectionCsv(section) {
      const rows = [];
      for (const spec of section.charts) {
        const model = buildChartModel(spec, section);
        if (!model.ok) continue;
        for (const row of model.tableRows) {
          rows.push({ section: section.kicker, chart_title: spec.title, ...row });
        }
      }
      downloadCsv(`${section.id}_data.csv`, rows);
    }

    function downloadAllCsv() {
      const rows = [];
      for (const [key, dataset] of state.datasets.entries()) {
        if (dataset.invalid) continue;
        for (const row of dataset.rows) {
          for (const header of dataset.headers) {
            if (header === "Date") continue;
            if (!Number.isFinite(row.values[header])) continue;
            rows.push({
              dataset_key: key,
              asset_name: DATASETS[key].label,
              date: row.dateIso,
              column: header,
              value: row.values[header],
              source_file: dataset.fileName,
              source_name: dataset.sourceName,
              source_url: dataset.sourceUrl
            });
          }
        }
      }
      downloadCsv("all_market_data.csv", rows);
    }

    function missingRequestsCsvRows() {
      return state.missingRequests;
    }

    function downloadCsv(fileName, rows) {
      const csv = toCsv(rows);
      downloadText(fileName, "\ufeff" + csv, "text/csv;charset=utf-8");
    }

    function toCsv(rows) {
      if (!rows.length) return "";
      const headers = Object.keys(rows[0]);
      return [headers.join(","), ...rows.map(row => headers.map(header => csvEscape(row[header])).join(","))].join("\r\n");
    }

    function downloadText(fileName, text, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      link.click();
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const text = value == null ? "" : String(value);
      return `"${text.replace(/"/g, '""')}"`;
    }

    function cleanCell(value) {
      if (value == null) return "";
      return String(value).trim();
    }

    function cleanHeader(value) {
      return cleanCell(value).replace(/\s+/g, " ");
    }

    function normalizeHeader(value) {
      return cleanHeader(value).toLowerCase();
    }

    function parseNumber(value) {
      if (typeof value === "number") return value;
      if (value instanceof Date) return NaN;
      const text = cleanCell(value);
      if (!text || text.includes("#N/A")) return NaN;
      const normalized = text.replace(/,/g, "").replace(/%$/, "");
      const number = Number(normalized);
      return Number.isFinite(number) ? number : NaN;
    }

    function parseDateValue(value) {
      if (value instanceof Date && !Number.isNaN(value.getTime())) {
        return dateOnly(value);
      }
      if (typeof value === "number" && Number.isFinite(value)) {
        const millis = Date.UTC(1899, 11, 30) + value * 86400000;
        return dateOnly(new Date(millis));
      }
      const text = cleanCell(value);
      if (!text) return null;
      const parsed = new Date(text);
      if (!Number.isNaN(parsed.getTime())) return dateOnly(parsed);
      const match = text.match(/^(\d{4})[.\-/](\d{1,2})[.\-/](\d{1,2})/);
      if (match) return new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
      return null;
    }

    function dateOnly(date) {
      return new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    }

    function isoDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function formatDateTime(date) {
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function shortDateLabel(value) {
      const text = String(value || "");
      const match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return text;
      return `${match[1].slice(2)}/${match[2]}`;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatCell(value) {
      if (typeof value === "number") return formatNumber(value);
      return value == null ? "" : value;
    }

    function formatNumber(value) {
      if (!Number.isFinite(value)) return "";
      return new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 4 }).format(value);
    }

    function compactNumber(value) {
      if (!Number.isFinite(value)) return "";
      return new Intl.NumberFormat("ko-KR", { notation: "compact", maximumFractionDigits: 2 }).format(value);
    }

    function numberOrNull(value) {
      return Number.isFinite(value) ? value : null;
    }

    function round(value, digits) {
      const factor = 10 ** digits;
      return Math.round(value * factor) / factor;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function unique(values) {
      return Array.from(new Set(values.filter(Boolean)));
    }

    function transparent(hex, alpha) {
      const clean = hex.replace("#", "");
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }
  </script>
</body>
