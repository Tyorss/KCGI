<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>5월 시장 데이터 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./preloaded-data.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f8f9;
      --panel: #ffffff;
      --panel-2: #f8f8f9;
      --text: #1a1a1a;
      --muted: #595959;
      --line: #e5e5e5;
      --navy: #191877;
      --gold: #c9a85b;
      --note: #e7eaf1;
      --amber: #c9a85b;
      --amber-soft: #f7f2df;
      --rose: #c00000;
      --green: #9cc826;
      --blue: #191877;
      --shadow: 0 8px 22px rgba(25, 24, 119, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "맑은 고딕", Calibri, Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      min-height: 36px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }

    button:hover {
      border-color: #9fb0c3;
      background: #f3f7fb;
    }

    button:active {
      transform: translateY(1px);
    }

    button.primary {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    button.primary:hover {
      background: #0a0d3f;
    }

    button.small {
      min-height: 30px;
      padding: 6px 10px;
      font-size: 13px;
    }

    .warning-bar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 22px;
      background: #fff5d6;
      border-bottom: 1px solid #ecd28b;
      color: #684a06;
      font-size: 14px;
      font-weight: 700;
    }

    .page {
      width: min(1440px, calc(100% - 36px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.15;
      letter-spacing: 0;
      color: var(--navy);
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .upload-panel {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      min-width: min(460px, 100%);
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .file-name {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hidden-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(130px, 1fr));
      gap: 10px;
      margin: 18px 0;
    }

    .summary-card {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 4px 14px rgba(18, 31, 46, 0.04);
    }

    .summary-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .summary-value {
      display: block;
      margin-top: 8px;
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-action {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: space-between;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin: 16px 0 20px;
    }

    .segmented {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .segmented button {
      border: 0;
      border-radius: 6px;
      background: transparent;
      min-height: 32px;
      padding: 6px 12px;
      color: var(--muted);
    }

    .segmented button.active {
      background: var(--navy);
      color: white;
    }

    .library-warning {
      display: none;
      margin: 12px 0;
      padding: 12px 14px;
      border: 1px solid #efbf65;
      border-radius: 8px;
      background: var(--amber-soft);
      color: #624306;
      font-weight: 700;
    }

    .section-card {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      min-height: min(900px, calc((100vw - 36px) * 0.5625));
    }

    .section-header {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      gap: 14px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .section-kicker {
      margin: 0 0 6px;
      color: var(--gold);
      font-weight: 800;
      font-size: 13px;
    }

    h2 {
      margin: 0;
      font-size: clamp(20px, 2vw, 28px);
      line-height: 1.25;
      letter-spacing: 0;
      color: var(--navy);
    }

    .section-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .interpretation {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .interpretation label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .interpretation textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--panel-2);
      color: var(--text);
      line-height: 1.45;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .chart-card,
    .request-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      overflow: hidden;
    }

    .chart-card {
      min-height: 430px;
      display: flex;
      flex-direction: column;
    }

    .chart-title-row,
    .request-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .chart-title,
    .request-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      letter-spacing: 0;
      color: var(--navy);
      font-weight: 800;
    }

    .chart-area {
      position: relative;
      height: 300px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #ffffff;
    }

    .chart-area.event-chart-area {
      height: 390px;
    }

    .chart-area.tall-chart-area {
      height: 390px;
    }

    .canvas-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .chart-area > svg {
      flex: 1;
      min-height: 0;
    }

    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 6px 14px;
      min-height: 20px;
      color: #1a1a1a;
      font-size: 12px;
      line-height: 1.2;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .legend-line {
      display: inline-block;
      width: 24px;
      height: 0;
      border-top: 3px solid currentColor;
    }

    .legend-dash {
      display: inline-block;
      min-width: 28px;
      color: currentColor;
      font-weight: 800;
      white-space: pre;
    }

    .legend-box {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: currentColor;
    }

    .chart-note {
      margin: 0 14px 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--note);
      color: var(--navy);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
    }

    .chart-note.warning {
      background: var(--amber-soft);
      color: #684a06;
    }

    .cap-share {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .cap-share-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--navy);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .cap-share-bar {
      display: flex;
      height: 12px;
      margin-top: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #f8f8f9;
    }

    .cap-share-segment.samsung {
      background: var(--navy);
    }

    .cap-share-segment.hynix {
      background: var(--gold);
    }

    .cap-share-segment.rest {
      background: #d8d8d8;
    }

    .cap-share-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .cap-share-legend span {
      white-space: nowrap;
    }

    .meta {
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    details.data-detail {
      border-top: 1px solid var(--line);
      background: #fcfdff;
    }

    details.data-detail summary {
      cursor: pointer;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .table-wrap {
      max-height: 260px;
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 520px;
      font-size: 12px;
    }

    th,
    td {
      padding: 7px 8px;
      border-bottom: 1px solid #e8edf3;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: inherit;
      z-index: 1;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #eef3f8;
      z-index: 2;
      color: var(--navy);
      font-weight: 800;
    }

    .request-card {
      padding: 0;
      background: #fffaf0;
      border-color: #f0d18d;
    }

    .request-title-row {
      border-bottom-color: #f0d18d;
      background: #fff5d6;
    }

    .request-body {
      padding: 12px 14px 14px;
      color: #604606;
      font-size: 13px;
      line-height: 1.55;
    }

    .request-body dl {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 6px 10px;
      margin: 0;
    }

    .request-body dt {
      font-weight: 800;
    }

    .request-body dd {
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--note);
      color: #39475a;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.ok {
      background: #e7f6ee;
      color: var(--green);
    }

    .pill.warn {
      background: var(--amber-soft);
      color: #765307;
    }

    .empty-state {
      border: 1px dashed #b6c4d5;
      border-radius: 8px;
      padding: 18px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (max-width: 1120px) {
      .summary-grid {
        grid-template-columns: repeat(3, minmax(150px, 1fr));
      }

      .topbar,
      .section-header {
        grid-template-columns: 1fr;
      }

      .section-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 820px) {
      .page {
        width: min(100% - 24px, 760px);
      }

      .summary-grid,
      .chart-grid {
        grid-template-columns: 1fr;
      }

      .warning-bar {
        padding: 10px 12px;
        align-items: flex-start;
      }

      .upload-panel {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="warning-bar">
    <span>목데이터 금지</span>
    <span>이 페이지는 업로드된 실제 데이터 기반으로만 시각화합니다. 데이터가 없는 항목은 차트를 생성하지 않고 필요한 자료를 요청합니다.</span>
  </div>

  <main id="dashboardPage" class="page">
    <div class="topbar">
      <div>
        <h1>5월 시장 데이터 대시보드</h1>
        <p class="subtitle">Bloomberg Excel/CSV 원천 파일을 브라우저에서 직접 파싱해 차트, 원천 데이터 표, PNG/CSV 다운로드를 제공합니다.</p>
      </div>

      <div class="upload-panel">
        <div class="upload-row">
          <button id="chooseFilesButton" class="primary" type="button">ZIP/XLSX/CSV 업로드</button>
          <button id="chooseFolderButton" type="button">폴더 업로드</button>
          <button id="clearButton" type="button">초기화</button>
        </div>
        <input id="fileInput" class="hidden-input" type="file" accept=".zip,.xlsx,.xls,.csv" multiple>
        <input id="folderInput" class="hidden-input" type="file" webkitdirectory multiple>
        <div id="fileName" class="file-name">아직 업로드된 파일이 없습니다.</div>
        <div id="status" class="status">5월.zip 또는 bloomberg 폴더를 선택하면 차트 생성 가능 여부를 판정합니다.</div>
      </div>
    </div>

    <div id="libraryWarning" class="library-warning"></div>

    <section id="summaryGrid" class="summary-grid" aria-label="요약 카드"></section>

    <div class="controls-row">
      <div class="segmented" aria-label="기간 선택">
        <button id="periodOneMonth" class="active" type="button">1개월</button>
        <button id="periodSixMonths" type="button">6개월</button>
        <button id="periodOneYear" type="button">1년</button>
        <button id="periodAll" type="button">전체 기간</button>
      </div>
      <div class="upload-row">
        <button id="downloadPagePng" type="button">전체 PNG</button>
        <button id="downloadAllCsv" type="button">전체 CSV</button>
        <button id="downloadMissingCsv" type="button">누락 데이터 요청서</button>
      </div>
    </div>

    <div id="sectionsRoot"></div>
  </main>

  <script>
    "use strict";

    const SOURCE_NAME = "Bloomberg";
    const SOURCE_URL = "Bloomberg Terminal";
    const MAIN_LINE_COLOR = "#191877";
    const REPORT_GRID_COLOR = "#e8e8e8";
    const REPORT_AXIS_COLOR = "#d8d8d8";
    const REPORT_TICK_COLOR = "#595959";
    const REPORT_TEXT_COLOR = "#1a1a1a";
    const CHART_DEVICE_PIXEL_RATIO = 2;
    const PNG_SCALE = 4;
    const DATA_CUTOFF_DATE = "2026-05-29";
    const PERIOD_OPTIONS = {
      "1m": { label: "1개월", months: 1 },
      "6m": { label: "6개월", months: 6 },
      "1y": { label: "1년", months: 12 },
      all: { label: "전체 기간", months: null }
    };
    const LATE_LISTING_KEYS = new Set(["DRAM", "NASA", "QTUM"]);

    const COLORS = [
      "#c9a85b",
      "#8c8c8c",
      "#9cc826",
      "#c00000",
      "#595959",
      "#c7d4ed",
      "#0a0d3f",
      "#ff0000",
      "#e5e5e5",
      "#f8f8f9"
    ];

    const DATASETS = {
      WTI: { label: "WTI", expected: "WTI.xlsx", match: [/wti/i] },
      US10Y: { label: "미국 10년물", expected: "10년물.xlsx", match: [/10.*년/, /10.*물/, /treasury/i, /usgg10/i] },
      CPI: { label: "CPI", expected: "CPI.xlsx", match: [/cpi/i] },
      SPY: { label: "SPY", expected: "SPY.xlsx", match: [/spy/i] },
      WIRP: { label: "WIRP", expected: "WIRP.xlsx", match: [/wirp/i] },
      KOSPI: { label: "KOSPI PEBD", expected: "5Y KOSPI PEBD.xlsx", match: [/kospi/i, /pebd/i] },
      KOSPI_MKT: { label: "KOSPI 시가총액", expected: "Kospi MKT.xlsx", match: [/kospi mkt/i, /current market cap/i] },
      KOSPI_FPE: { label: "KOSPI Forward P/E", expected: "KSOPI_FPE.xlsx", match: [/ksopi_fpe/i, /best p\/e ratio/i] },
      SAMSUNG: { label: "삼성전자", expected: "삼성.xlsx", match: [/삼성/, /samsung/i, /005930/] },
      HYNIX: { label: "SK하이닉스", expected: "하이닉스.xlsx", match: [/하이닉스/, /hynix/i, /000660/] },
      DRAM: { label: "DRAM ETF", expected: "DRAM.xlsx", match: [/dram/i] },
      CSI300: { label: "CSI300", expected: "CSI300.xlsx", match: [/csi300/i] },
      HSTECH: { label: "HSTECH", expected: "HSTECH.xlsx", match: [/hstech/i, /hang seng tech/i] },
      STAR50: { label: "STAR50", expected: "Star50.xlsx", match: [/star50/i, /star 50/i] },
      QTUM: { label: "QTUM", expected: "QTUM.xlsx", match: [/qtum/i] },
      NASA: { label: "NASA", expected: "NASA.xlsx", match: [/nasa/i] },
      KRX_BREADTH: { label: "KRX 상승/하락/보합", expected: "KRX/*주가변동.csv", match: [/krx/i, /advancers/i, /decliners/i] },
      KRX_JEONNIK: { label: "전닉 상장주식수", expected: "KRX/*주가변동.csv", match: [/samsungmarketcap/i, /hynixmarketcap/i] }
    };

    const SECTIONS = [
      {
        id: "macro",
        kicker: "SECTION 1. 매크로",
        title: "매크로: 유가 하락에도 금리는 높은 상태인가?",
        charts: [
          {
            id: "macro-wti-us10y",
            title: "WTI vs 미국 10년물 금리",
            kind: "dualLine",
            series: [
              { key: "WTI", label: "WTI", columns: ["PX_LAST"], axis: "y" },
              { key: "US10Y", label: "미국 10년물", columns: ["PX_LAST", "YLD_YTM_MID"], axis: "y1" }
            ]
          },
          {
            id: "macro-wti-cpi-us10y",
            title: "WTI + CPI YoY + 미국 10년물 금리",
            kind: "dualLine",
            warning: "WTI, 미국 10년물, CPI를 각각 별도 y축으로 표시합니다. CPI는 마지막 월간값을 최신 날짜까지 수평 유지합니다.",
            padYAxes: true,
            yTitle: "WTI",
            y1Title: "10년물(%)",
            y2Title: "CPI YoY(%)",
            series: [
              { key: "WTI", label: "WTI", columns: ["PX_LAST"], axis: "y" },
              { key: "US10Y", label: "미국 10년물", columns: ["PX_LAST", "YLD_YTM_MID"], axis: "y1" },
              { key: "CPI", label: "CPI YoY", columns: ["PX_LAST"], axis: "y2", stepped: true, carryForward: true }
            ]
          },
          {
            id: "macro-spy-volume",
            title: "SPY 가격 + 거래량",
            kind: "priceVolume",

    function boot() {
      bindEvents();
      checkLibraries();
      loadPreloadedData();
      render();
    }

    function bindEvents() {
      el.chooseFilesButton.addEventListener("click", () => el.fileInput.click());
      el.chooseFolderButton.addEventListener("click", () => el.folderInput.click());
      el.clearButton.addEventListener("click", clearData);
      el.fileInput.addEventListener("change", event => handleSelectedFiles(Array.from(event.target.files || [])));
      el.folderInput.addEventListener("change", event => handleSelectedFiles(Array.from(event.target.files || [])));
      el.periodOneMonth.addEventListener("click", () => setPeriod("1m"));
      el.periodSixMonths.addEventListener("click", () => setPeriod("6m"));
      el.periodOneYear.addEventListener("click", () => setPeriod("1y"));
      el.periodAll.addEventListener("click", () => setPeriod("all"));
      el.downloadPagePng.addEventListener("click", () => downloadElementPng(document.getElementById("dashboardPage"), "5월_시장_데이터_대시보드.png"));
      el.downloadAllCsv.addEventListener("click", downloadAllCsv);
      el.downloadMissingCsv.addEventListener("click", () => downloadCsv("missing_data_requests.csv", missingRequestsCsvRows()));
    }

    function loadPreloadedData() {
      const payload = window.PRELOADED_DATASETS;
      if (!payload || !Array.isArray(payload.datasets)) return;
      state.datasets.clear();
      state.uploadedAt = payload.generatedAt ? new Date(payload.generatedAt) : new Date();
      for (const dataset of payload.datasets) {
        if (!dataset.key) continue;
        const rows = filterRowsByCutoff((dataset.rows || []).map(row => ({
          ...row,
          date: new Date(`${row.dateIso}T00:00:00Z`),
          raw: row.raw || {}
        })));
        state.datasets.set(dataset.key, {
          ...dataset,
          rows,
          sourceName: dataset.sourceName || SOURCE_NAME,
          sourceUrl: dataset.sourceUrl || SOURCE_URL
        });
      }
      el.fileName.textContent = payload.sourceFolder || "bloomberg";
      el.status.textContent = `${state.datasets.size}개 현재 데이터셋을 미리 불러왔습니다.`;
    }

    function checkLibraries() {
      const missing = [];
      if (!window.JSZip) missing.push("JSZip");
      if (!window.XLSX) missing.push("SheetJS XLSX");
      if (!window.Chart) missing.push("Chart.js");
      if (!window.html2canvas) missing.push("html2canvas");
      if (missing.length) {
        el.libraryWarning.style.display = "block";
        el.libraryWarning.textContent = "외부 라이브러리 일부가 로드되지 않았습니다: " + missing.join(", ") + ". 현재 내장 데이터 그래프는 SVG로 표시되며, 업로드/인터랙티브 차트/PNG 기능은 인터넷 연결 후 새로고침하면 활성화됩니다.";
      } else {
        el.libraryWarning.style.display = "none";
      }
    }

    function clearData() {
      destroyCharts();
      state.datasets.clear();
      state.uploadedAt = null;
      state.availableSummaries = [];
      state.missingRequests = [];
      state.computedReturns = [];
      el.fileInput.value = "";
      el.folderInput.value = "";
      el.fileName.textContent = "아직 업로드된 파일이 없습니다.";
      el.status.textContent = "초기화되었습니다. 5월.zip 또는 bloomberg 폴더를 다시 선택하세요.";
      render();
    }

    async function handleSelectedFiles(files) {
      checkLibraries();
      if (!files.length) return;
      if (!window.XLSX) {
        el.status.textContent = "SheetJS XLSX 라이브러리가 로드되지 않아 파일을 파싱할 수 없습니다.";
        return;
      }

      destroyCharts();
      state.datasets.clear();
      state.uploadedAt = new Date();
      el.fileName.textContent = files.map(file => file.webkitRelativePath || file.name).join(", ");
      el.status.textContent = "파일 파싱 중...";

      const parsed = [];
      for (const file of files) {
        const name = file.webkitRelativePath || file.name;
        if (/\.zip$/i.test(file.name)) {
          if (!window.JSZip) {
            el.status.textContent = "JSZip 라이브러리가 로드되지 않아 ZIP 파일을 열 수 없습니다.";
            continue;
          }
          parsed.push(...await parseZip(file));
        } else if (/\.(xlsx|xls|csv)$/i.test(file.name)) {
          parsed.push(await parseUploadedFile(name, await file.arrayBuffer()));
        }
      }

      for (const result of parsed.filter(Boolean)) {
        const key = identifyDataset(result.fileName, result.headers, result.metadataText);
        if (!key) continue;
        result.key = key;
        result.assetName = DATASETS[key].label;
        state.datasets.set(key, result);
      }

      el.status.textContent = state.datasets.size
        ? `${state.datasets.size}개 데이터셋을 인식했습니다.`
        : "인식 가능한 데이터셋이 없습니다. 파일명 또는 내부 컬럼을 확인하세요.";
      render();
    }

    async function parseZip(file) {
      const zip = await JSZip.loadAsync(file);
      const results = [];
      const entries = Object.values(zip.files).filter(entry => !entry.dir && /\.(xlsx|xls|csv)$/i.test(entry.name));
      for (const entry of entries) {
        const buffer = await entry.async("arraybuffer");
        results.push(await parseUploadedFile(entry.name, buffer));
      }
      return results;
    }

    async function parseUploadedFile(fileName, buffer) {
      try {
        const isCsv = /\.csv$/i.test(fileName);
        const workbook = isCsv
          ? XLSX.read(new TextDecoder("utf-8").decode(buffer), { type: "string", cellDates: true })
          : XLSX.read(buffer, { type: "array", cellDates: true, cellNF: true, cellText: false });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null, blankrows: false });
        const headerIndex = aoa.findIndex(row => cleanCell(row[0]).toLowerCase() === "date");
        const metadataRows = headerIndex >= 0 ? aoa.slice(0, headerIndex) : [];
        const metadataText = metadataRows.flat().map(cleanCell).filter(Boolean).join(" ");
        const invalid = aoa.flat().some(value => cleanCell(value).includes("#N/A Requesting Data"));

        if (headerIndex < 0) {
          return {
            fileName,
            sheetName,
            headers: [],
            rows: [],
            metadataText,
            invalid: true,
            invalidReason: "Date 헤더 행을 찾지 못했습니다.",
            sourceName: SOURCE_NAME,
            sourceUrl: SOURCE_URL
          };
        }

        const headers = aoa[headerIndex].map((value, index) => cleanHeader(value || `Column ${index + 1}`));
        const rows = [];
        for (const row of aoa.slice(headerIndex + 1)) {
          const date = parseDateValue(row[0]);
          if (!date) continue;
          const values = {};
          const raw = {};
          headers.forEach((header, index) => {
            const cell = row[index];
            raw[header] = cell;
            const number = parseNumber(cell);
            if (Number.isFinite(number)) values[header] = number;
          });
          rows.push({ date, dateIso: isoDate(date), values, raw });
        }

        rows.sort((a, b) => a.date.getTime() - b.date.getTime());
        return {
          fileName,
          sheetName,
          headers,
          rows: filterRowsByCutoff(rows),
          metadataText,
          invalid,
          invalidReason: invalid ? "#N/A Requesting Data 포함" : "",
          sourceName: SOURCE_NAME,
          sourceUrl: SOURCE_URL
        };
      } catch (error) {
        return {
          fileName,
          sheetName: "",
          headers: [],
          rows: [],
          metadataText: "",
          invalid: true,
          invalidReason: error.message,
          sourceName: SOURCE_NAME,
          sourceUrl: SOURCE_URL
        };
      }
    }

    function identifyDataset(fileName, headers, metadataText) {
      const text = [fileName, headers.join(" "), metadataText].join(" ");
      for (const [key, config] of Object.entries(DATASETS)) {
        if (config.match.some(pattern => pattern.test(text))) return key;
      }
      return null;
    }

    function buildDualLineModel(spec, section) {
      const series = [];
      const files = [];
      const columns = [];
      const requiredFiles = [];
      const requiredColumns = [];
      const reasons = [];
      for (const item of spec.series) {
        const selected = selectSeries(item.key, item.columns);
        requiredFiles.push(DATASETS[item.key].expected);
        requiredColumns.push(`${DATASETS[item.key].label}: ${item.columns.join(" 또는 ")}`);
        if (!selected.ok) {
          reasons.push(selected.reason);
          continue;
        }
        files.push(selected.dataset.fileName);
        columns.push(`${selected.dataset.assetName || DATASETS[item.key].label}: ${selected.column}`);
        series.push({ ...item, ...selected });
      }
      if (series.length !== spec.series.length) {
        return missingModel(spec, reasons.join(" / "), requiredFiles, requiredColumns);
      }

      const labels = collectDates(series.map(item => item.rows));
      if (!labels.length) return missingModel(spec, "선택 기간에 유효한 날짜가 없습니다.", requiredFiles, requiredColumns);

      const datasets = series.map((item, index) => {
        return {
          type: "line",
          label: item.label,
          data: valuesForLabels(item, labels),
          borderColor: COLORS[index],
          backgroundColor: COLORS[index],
          yAxisID: item.axis || "y",
          spanGaps: true,
          tension: item.stepped ? 0 : 0.2,
          stepped: Boolean(item.stepped),
          pointRadius: 2
        };
      });

      return okModel(
        spec,
        section,
        files,
        columns,
        labels,
        datasets,
        tableRowsFromSeries(labels, series),
        spec.warning || "",
        false,
        false,
        `${SOURCE_NAME} / ${SOURCE_URL}`,
        false,
        spec.yTitle || "",
        spec.y1Title || "",
        spec.y2Title || ""
      );
    }

    function valuesForLabels(item, labels) {
      const byDate = new Map(item.rows.map(row => [row.dateIso, row.values[item.column]]));
      let lastValue = null;
      return labels.map(date => {
        if (byDate.has(date)) {
          lastValue = byDate.get(date);
          return lastValue;
        }
        return item.carryForward && Number.isFinite(lastValue) ? lastValue : null;
      });
    }

    function buildNormalizedModel(spec, section) {
      const series = [];
      const files = [];
      const columns = [];
      const requiredFiles = [];
      const requiredColumns = [];
      const reasons = [];
      for (const item of spec.series) {
        const selected = selectSeries(item.key, item.columns);
        requiredFiles.push(DATASETS[item.key].expected);
        requiredColumns.push(`${DATASETS[item.key].label}: ${item.columns.join(" 또는 ")}`);
        if (!selected.ok) {
          reasons.push(selected.reason);
          continue;
        }
        files.push(selected.dataset.fileName);
        columns.push(`${selected.dataset.assetName || DATASETS[item.key].label}: ${selected.column}`);
        series.push({ ...item, ...selected });
      }
      if (series.length !== spec.series.length) {
        return missingModel(spec, reasons.join(" / "), requiredFiles, requiredColumns);
      }
      const alignedSeries = alignByLateListingStart(series);
      for (const item of alignedSeries) {
        const base = item.rows.find(row => Number.isFinite(row.values[item.column]));
        if (!base || base.values[item.column] === 0) {
          return missingModel(spec, `${DATASETS[item.key].label}의 공통 시작일 기준값이 없습니다.`, requiredFiles, requiredColumns);
        }
        item.baseValue = base.values[item.column];
      }
      const labels = collectDates(alignedSeries.map(item => item.rows));
      if (!labels.length) return missingModel(spec, "선택 기간에 유효한 날짜가 없습니다.", requiredFiles, requiredColumns);
      const datasets = alignedSeries.map((item, index) => {
        const byDate = new Map(item.rows.map(row => [row.dateIso, row.values[item.column] / item.baseValue * 100]));
        return {
          type: "line",
          label: item.label,
          data: labels.map(date => byDate.has(date) ? round(byDate.get(date), 4) : null),
          borderColor: COLORS[index],
          backgroundColor: COLORS[index],
          yAxisID: "y",
          spanGaps: true,
          tension: 0.2,
          pointRadius: 2
        };
      });
      const tableRows = tableRowsFromSeries(labels, alignedSeries, item => row => round(row.values[item.column] / item.baseValue * 100, 4));
      const note = usesLateListingAlignment(alignedSeries)
        ? "정규화 기준: 포함 종목 중 가장 늦게 데이터가 시작되는 날짜 = 100"
        : "정규화 기준: 선택 기간의 첫 거래일 = 100";
      return okModel(spec, section, files, columns, labels, datasets, tableRows, note);
    }

    function usesLateListingAlignment(series) {
      return series.some(item => LATE_LISTING_KEYS.has(item.key));
    }

    function alignByLateListingStart(series) {
      if (!usesLateListingAlignment(series)) return series;
      const firstDates = series
        .map(item => item.rows.find(row => Number.isFinite(row.values[item.column]))?.date)
        .filter(Boolean);
      if (!firstDates.length) return series;
      const commonStart = firstDates.reduce((latest, date) => date > latest ? date : latest, firstDates[0]);
      return series.map(item => ({
        ...item,
        rows: item.rows.filter(row => row.date >= commonStart)
      }));
    }

    function buildReturnsModel(spec, section) {
      const returnsByPeriod = new Map();
      const periodSpecs = [
        { key: "1m", label: "1개월", color: "#c9a85b" },
        { key: "6m", label: "6개월", color: "#191877" },
        { key: "1y", label: "1년", color: "#8c8c8c" }
      ];
      const files = [];
      const columns = [];
      const requiredFiles = [];
      const requiredColumns = [];
      const assetLabels = [];
      for (const item of spec.assets) {
        requiredFiles.push(DATASETS[item.key].expected);
        requiredColumns.push(`${DATASETS[item.key].label}: ${item.columns.join(" 또는 ")}`);
      }
      const alignLateListings = spec.assets.some(item => LATE_LISTING_KEYS.has(item.key));
      const commonStarts = new Map();
      if (alignLateListings) {
        for (const period of periodSpecs) {
          commonStarts.set(period.key, commonStartForReturnPeriod(spec.assets, period.key));
        }
      }
      for (const item of spec.assets) {
        for (const period of periodSpecs) {
          const commonStart = alignLateListings ? commonStarts.get(period.key) : null;
          const result = computeReturn(item.key, item.columns, period.key, commonStart, Boolean(commonStart));
          if (!result.ok) continue;
          if (!returnsByPeriod.has(period.key)) returnsByPeriod.set(period.key, []);
          returnsByPeriod.get(period.key).push(result);
          if (!assetLabels.includes(result.assetName)) assetLabels.push(result.assetName);
          files.push(result.sourceFile);
          columns.push(`${result.assetName}: ${result.column}`);
          state.computedReturns.push({
            period: period.key,
            asset_name: result.assetName,
            first_date: result.firstDate,
            first_value: result.firstValue,
            last_date: result.lastDate,
            last_value: result.lastValue,
            return_pct: result.returnPct,
            source_file: result.sourceFile
          });
        }
      }
      if (!assetLabels.length) {
        return missingModel(spec, "수익률 계산에 필요한 첫 거래일/마지막 거래일 값이 없습니다.", requiredFiles, requiredColumns);
      }
      const labels = assetLabels;
      const datasets = periodSpecs
        .filter(period => returnsByPeriod.has(period.key))
        .map(period => {

          };

        last_date: row.lastDate,
        last_value: row.lastValue,

      })));

      const note = alignLateListings
        ? `수익률 계산식: (마지막 값 / 첫 값 - 1) * 100. DRAM/NASA/QTUM 포함 그래프는 포함 종목 중 가장 늦게 데이터가 시작되는 날짜부터 계산합니다.${commonStartLabels.length ? ` 공통 시작일: ${commonStartLabels.join(", ")}.` : ""}`
        : "수익률 계산식: (마지막 값 / 첫 값 - 1) * 100. 1개월·6개월·1년 기준을 함께 표시합니다.";
      return okModel(spec, section, unique(files), unique(columns), labels, datasets, tableRows, note, false, true);
    }

    function commonStartForReturnPeriod(assets, mode) {
      const starts = assets.map(item => {
        const dataset = state.datasets.get(item.key);
        if (!dataset || dataset.invalid) return null;
        const column = resolveColumn(dataset.headers, item.columns);
        if (!column) return null;
        const rows = rowsForPeriod(dataset, mode).filter(row => Number.isFinite(row.values[column]));
        return rows[0]?.date || null;
      }).filter(Boolean);
      if (!starts.length) return null;
      return starts.reduce((latest, date) => date > latest ? date : latest, starts[0]);
    }

          Number.isFinite(row.values.Advancers) ||
          Number.isFinite(row.values.Decliners) ||
          Number.isFinite(row.values.Unchanged)
        )
        .slice(-3);

        Number.isFinite(row.values.SamsungMarketCap) &&

        hynixShare,
        restShare,
        combinedShare
      });

            <strong>삼성전자 ${escapeHtml(formatNumber(round(summary.samsungShare, 1)))}% · SK하이닉스 ${escapeHtml(formatNumber(round(summary.hynixShare, 1)))}% · 합산 ${escapeHtml(formatNumber(round(summary.combinedShare, 1)))}%</strong>
          </div>
          <div class="cap-share-bar" aria-label="삼성전자와 SK하이닉스 KOSPI 시가총액 비중">
            <span class="cap-share-segment samsung" style="width:${samsungWidth}%"></span>
            <span class="cap-share-segment hynix" style="width:${hynixWidth}%"></span>
            <span class="cap-share-segment rest" style="width:${restWidth}%"></span>
          </div>
          <div class="cap-share-legend">
            <span>삼성전자 ${escapeHtml(formatNumber(round(summary.samsungShare, 1)))}%</span>
            <span>SK하이닉스 ${escapeHtml(formatNumber(round(summary.hynixShare, 1)))}%</span>
            <span>기타 ${escapeHtml(formatNumber(round(summary.restShare, 1)))}%</span>
          </div>

    function buildKospiExJeonnikModel(spec, section) {
      const total = selectSeries("KOSPI_MKT", ["Current Market Cap"]);
      const fpe = selectSeries("KOSPI_FPE", ["BEst P/E Ratio"]);
      const samsung = selectSeries("SAMSUNG", ["PX_LAST"]);
      const hynix = selectSeries("HYNIX", ["PX_LAST"]);
      const sharesDataset = state.datasets.get("KRX_JEONNIK");
      const peBandSpecs = spec.peBandLines || [];
      const peBandDataset = peBandSpecs.length ? state.datasets.get("KOSPI") : null;
      const showExJeonnik = spec.showExJeonnik !== false;
      const requiredFiles = ["Kospi MKT.xlsx", "KSOPI_FPE.xlsx", "삼성.xlsx", "하이닉스.xlsx", "KRX/*주가변동.csv"];
      const requiredColumns = ["Current Market Cap", "BEst P/E Ratio", "삼성전자 PX_LAST", "SK하이닉스 PX_LAST", "SamsungShares, HynixShares"];
      const failures = [total, fpe, samsung, hynix].filter(item => !item.ok).map(item => item.reason);
      if (!sharesDataset) failures.push("KRX 전닉 상장주식수 데이터가 없습니다.");
      if (peBandSpecs.length) {
        requiredFiles.push(DATASETS.KOSPI.expected);
        requiredColumns.push(peBandSpecs.map(item => `${item.label}: ${item.columns.join(" 또는 ")}`).join(", "));
        if (!peBandDataset) {
          failures.push("KOSPI P/E 밴드 데이터가 없습니다.");
        } else if (peBandDataset.invalid) {
          failures.push(`KOSPI P/E 밴드 데이터가 Invalid 처리되었습니다: ${peBandDataset.invalidReason}`);
        }
      }
      if (failures.length) return missingModel(spec, failures.join(" / "), requiredFiles, requiredColumns);

      const shareRow = [...sharesDataset.rows].reverse().find(row =>
        Number.isFinite(row.values.SamsungShares) && Number.isFinite(row.values.HynixShares)
      );
      if (!shareRow) return missingModel(spec, "KRX CSV에서 삼성전자/SK하이닉스 상장주식수를 찾지 못했습니다.", requiredFiles, requiredColumns);

      const samsungShares = shareRow.values.SamsungShares;
      const hynixShares = shareRow.values.HynixShares;
      const totalColumn = total.column;
      const fpeColumn = fpe.column;
      const samsungColumn = samsung.column;
      const hynixColumn = hynix.column;
      const totalByDate = new Map(total.rows.map(row => [row.dateIso, row.values[totalColumn]]));
      const fpeByDate = new Map(fpe.rows.map(row => [row.dateIso, row.values[fpeColumn]]));
      const samsungByDate = new Map(samsung.rows.map(row => [row.dateIso, row.values[samsungColumn]]));
      const hynixByDate = new Map(hynix.rows.map(row => [row.dateIso, row.values[hynixColumn]]));
      let peBandPriceRows = [];
      let peBandPriceByDate = new Map();
      if (peBandSpecs.length) {
        const peBandPriceColumn = resolveColumn(peBandDataset.headers, ["Price"]);
        if (!peBandPriceColumn) {
          failures.push("KOSPI P/E 밴드 데이터에서 Price 컬럼을 찾지 못했습니다.");
        } else {
          peBandPriceRows = filteredRows(peBandDataset).filter(row => Number.isFinite(row.values[peBandPriceColumn]));
          peBandPriceByDate = new Map(peBandPriceRows.map(row => [row.dateIso, row.values[peBandPriceColumn]]));
        }
      }
      const peBandLines = peBandSpecs.map(item => {
        const column = resolveColumn(peBandDataset.headers, item.columns);
        if (!column) {
          failures.push(`KOSPI P/E 밴드에서 ${item.label} 컬럼을 찾지 못했습니다.`);
          return null;
        }
        const rows = filteredRows(peBandDataset).filter(row => Number.isFinite(row.values[column]));
        const byDate = new Map(rows.map(row => [row.dateIso, row.values[column]]));
        return { label: item.label, column, rows, byDate };
      }).filter(Boolean);
      if (failures.length) return missingModel(spec, failures.join(" / "), requiredFiles, requiredColumns);

      const labelRows = [total.rows, fpe.rows, samsung.rows, hynix.rows, peBandPriceRows, ...peBandLines.map(item => item.rows)];
      const labels = collectDates(labelRows).filter(date =>
        Number.isFinite(totalByDate.get(date)) &&
        Number.isFinite(fpeByDate.get(date)) &&
        Number.isFinite(samsungByDate.get(date)) &&
        Number.isFinite(hynixByDate.get(date)) &&
        (!peBandLines.length || Number.isFinite(peBandPriceByDate.get(date))) &&
        peBandLines.every(item => Number.isFinite(item.byDate.get(date)))
      );
      if (labels.length < 2) return missingModel(spec, "KOSPI 시총, 전닉 가격, Forward P/E가 겹치는 날짜가 부족합니다.", requiredFiles, requiredColumns);

      const exValues = labels.map(date => totalByDate.get(date) - samsungByDate.get(date) * samsungShares - hynixByDate.get(date) * hynixShares);
      const totalBase = totalByDate.get(labels[0]);
      const exBase = exValues[0];
      if (!Number.isFinite(totalBase) || !Number.isFinite(exBase) || totalBase === 0 || exBase === 0) {
        return missingModel(spec, "정규화 기준값이 유효하지 않습니다.", requiredFiles, requiredColumns);
      }
      const peBandScaleBase = peBandLines.length ? peBandPriceByDate.get(labels[0]) : null;
      if (peBandLines.length && (!Number.isFinite(peBandScaleBase) || peBandScaleBase === 0)) {
        return missingModel(spec, "P/E 밴드를 KOSPI 기준으로 환산할 기준 Price 값이 유효하지 않습니다.", requiredFiles, requiredColumns);
      }

      const datasets = [
        {
          type: "line",
          label: "KOSPI",
          data: labels.map(date => round(totalByDate.get(date) / totalBase * 100, 4)),
          yAxisID: "y",
          tension: 0.2,
          spanGaps: true
        },
        {
          type: "line",
          label: "KOSPI Forward P/E",
          data: labels.map(date => fpeByDate.get(date)),
          yAxisID: "y1",
          tension: 0.2,
          spanGaps: true
        }
      ];
      if (showExJeonnik) {
        datasets.splice(1, 0, {
          type: "line",
          label: "삼성전자, 하이닉스 제외",
          data: exValues.map(value => round(value / exBase * 100, 4)),
          yAxisID: "y",
          tension: 0.2,
          spanGaps: true
        });
      }
      const firstPeBandDatasetIndex = datasets.length;
      for (const item of peBandLines) {
        datasets.push({
          type: "line",
          label: item.label,
          data: labels.map(date => round(item.byDate.get(date) / peBandScaleBase * 100, 4)),
          yAxisID: "y",
          tension: 0.2,
          spanGaps: true
        });
      }
      const tableRows = labels.map((date, index) => ({
        Date: date,
        KospiMarketCap: totalByDate.get(date),
        ...(showExJeonnik ? {
          SamsungMarketCapDerived: samsungByDate.get(date) * samsungShares,
          HynixMarketCapDerived: hynixByDate.get(date) * hynixShares,
          ExJeonnikMarketCap: exValues[index]
        } : {}),
        KospiIndex: datasets[0].data[index],
        ...(showExJeonnik ? { ExJeonnikIndex: datasets[1].data[index] } : {}),
        ForwardPE: fpeByDate.get(date),
        ...Object.fromEntries(peBandLines.map((item, bandIndex) => [item.label, datasets[firstPeBandDatasetIndex + bandIndex].data[index]]))
      }));
      const files = showExJeonnik
        ? [total.dataset.fileName, fpe.dataset.fileName, samsung.dataset.fileName, hynix.dataset.fileName, sharesDataset.fileName, peBandDataset?.fileName]
        : [total.dataset.fileName, fpe.dataset.fileName, peBandDataset?.fileName];
      const columns = [
        "KOSPI Current Market Cap",
        "KOSPI BEst P/E Ratio",
        ...(showExJeonnik ? ["삼성전자 PX_LAST × KRX SamsungShares", "SK하이닉스 PX_LAST × KRX HynixShares"] : []),
        ...peBandLines.map(item => `KOSPI ${item.column}`)
      ];
      const exNote = showExJeonnik ? ` 전닉 시총은 KRX 상장주식수(${shareRow.dateIso})와 Bloomberg 가격으로 계산했습니다.` : "";
      const peBandNote = peBandLines.length ? " P/E 밴드는 KOSPI Price의 첫 기준값으로 환산했습니다." : "";
      return okModel(
        spec,
        section,
        unique(files),
        columns,
        labels,
        datasets,
        tableRows,
        `정규화 기준: 선택 기간 첫 날짜 = 100.${exNote}${peBandNote}`,
        false,
        false,
        `${SOURCE_NAME} / ${SOURCE_URL}, KRX / KRX CSV`,
        false,
        "상승률 지수",
        "Forward P/E"
      );
    }

    function styleLineDatasets(datasets) {
      let lineIndex = 0;
      return datasets.map(dataset => {
        if (dataset.type !== "line") return dataset;
        const isMainLine = lineIndex === 0;
        const lineColor = isMainLine ? MAIN_LINE_COLOR : COLORS[(lineIndex - 1) % COLORS.length];
        const styled = {
          ...dataset,
          borderColor: lineColor,
          backgroundColor: lineColor,
          borderDash: isMainLine ? [] : [7, 5],
          borderWidth: isMainLine ? 3 : 2.2,
          pointRadius: 0,
          pointHoverRadius: 0
        };
        lineIndex += 1;
        return styled;
      });
    }

    function okModel(spec, section, files, columns, labels, datasets, tableRows, note = "", priceVolume = false, bar = false, sourceLabel = `${SOURCE_NAME} / ${SOURCE_URL}`, plainYAxis = false, yTitle = "", y1Title = "", y2Title = "") {
      return {
        ok: true,
        spec,
        section,
        files: unique(files),
        columns: unique(columns),
        labels,
        datasets: styleLineDatasets(datasets),
        tableRows,
        note,
        priceVolume,
        bar,
        sourceLabel,
        plainYAxis,
        yTitle,
        y1Title,
        y2Title,
        periodLabel: periodLabel(),
        updatedAt: state.uploadedAt ? formatDateTime(state.uploadedAt) : "-"
      };
    }

    function missingModel(spec, reason, requiredFiles = [], requiredColumns = []) {
      return {
        ok: false,
        spec,
        reason: reason || "필요 데이터가 없습니다.",
        requiredFiles,
        requiredColumns,
        suggestedSource: "Bloomberg"
      };
    }

    function renderChartCard(parent, model, section) {
      const card = document.createElement("div");
      card.className = "chart-card";
      const safeId = `${section.id}-${model.spec.id}`;
      const useSvg = model.forceSvg || !window.Chart;
      const chartAreaClass = `chart-area${(model.events || model.eventBands) ? " event-chart-area" : ""}${model.tallChart ? " tall-chart-area" : ""}`;
      const chartMarkup = model.customSvg || (useSvg ? renderSvgChart(model) : `<div class="canvas-wrap"><canvas id="${safeId}-canvas"></canvas></div>${renderHtmlLegend(model)}`);
      card.innerHTML = `
        <div class="chart-title-row">
          <h3 class="chart-title">${escapeHtml(model.spec.title)}</h3>
          <button class="small" data-chart-png="${safeId}" type="button">차트 PNG</button>
        </div>
        ${model.note ? `<p class="chart-note ${model.note.includes("주기") ? "warning" : ""}">${escapeHtml(model.note)}</p>` : ""}
        <div class="${chartAreaClass}">${model.preChartHtml || ""}${chartMarkup}</div>
        <div class="meta">
          사용 파일명: ${escapeHtml(model.files.join(", "))}<br>
          사용 컬럼: ${escapeHtml(model.columns.join(", "))}<br>
          기준 기간: ${escapeHtml(model.periodLabel)} · 출처: ${escapeHtml(model.sourceLabel)} · 마지막 업데이트: ${escapeHtml(model.updatedAt)}
        </div>
        ${renderDataTable(model.tableRows)}
      `;
      parent.appendChild(card);
      card.querySelector(`[data-chart-png="${safeId}"]`).addEventListener("click", () => downloadElementPng(card.querySelector(".chart-area"), `${safeId}.png`));

      if (window.Chart && !model.forceSvg && !model.customSvg) {
        const ctx = card.querySelector("canvas");
        const chart = new Chart(ctx, {
          type: model.bar ? "bar" : "line",
          data: {
            labels: model.labels,
            datasets: model.datasets
          },
          options: chartOptions(model)
        });
        state.chartInstances.set(safeId, chart);
      }
    }

    function renderHtmlLegend(model) {
      const items = model.datasets.map((dataset, index) => {
        const color = Array.isArray(dataset.borderColor) ? dataset.borderColor[0] : (dataset.borderColor || COLORS[index % COLORS.length]);
        const label = dataset.label || `Series ${index + 1}`;
        let marker = `<span class="legend-box" style="color:${escapeHtml(color)}"></span>`;
        if (dataset.type === "line") {
          marker = Array.isArray(dataset.borderDash) && dataset.borderDash.length
            ? `<span class="legend-dash" style="color:${escapeHtml(color)}">- - -</span>`
            : `<span class="legend-line" style="color:${escapeHtml(color)}"></span>`;
        }
        return `<span class="legend-item">${marker}<span>${escapeHtml(label)}</span></span>`;
      }).join("");
      return `<div class="chart-legend">${items}</div>`;
    }

    function renderMarketCapRankSvg(rows) {
      const width = 900;
      const height = 390;
      const margin = { top: 24, right: 132, bottom: 34, left: 184 };
      const plotWidth = width - margin.left - margin.right;
      const rowHeight = 27;
      const maxValue = Math.max(...rows.map(row => row.high)) * 1.06;
      const x = value => margin.left + value / maxValue * plotWidth;
      let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="100%" role="img" aria-label="글로벌 시가총액 순위">`;
      svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"></rect>`;
      svg += `<text x="22" y="18" font-size="12" font-weight="800" fill="${REPORT_TICK_COLOR}">순위</text>`;
      svg += `<text x="78" y="18" font-size="12" font-weight="800" fill="${REPORT_TICK_COLOR}">기업</text>`;
      svg += `<text x="${margin.left}" y="18" font-size="12" font-weight="800" fill="${REPORT_TICK_COLOR}">시가총액(조 달러)</text>`;
      [0, 1, 2, 3, 4, 5].forEach(tick => {
        const xx = x(tick);
        svg += `<line x1="${round(xx, 2)}" y1="${margin.top}" x2="${round(xx, 2)}" y2="${height - margin.bottom}" stroke="${REPORT_GRID_COLOR}" stroke-width="0.7" stroke-dasharray="2 5"></line>`;
        svg += `<text x="${round(xx, 2)}" y="${height - 10}" text-anchor="middle" font-size="12" fill="${REPORT_TICK_COLOR}">$${tick}T</text>`;
      });
      rows.forEach((row, index) => {
        const y = margin.top + index * rowHeight + 13;
        const barY = y - 8;
        const color = row.virtual ? "#c9a85b" : MAIN_LINE_COLOR;
        const fill = row.virtual ? transparent("#c9a85b", 0.7) : transparent(MAIN_LINE_COLOR, 0.78);
        const labelColor = row.virtual ? MAIN_LINE_COLOR : REPORT_TEXT_COLOR;
        svg += `<text x="22" y="${y + 4}" font-size="12" font-weight="${row.virtual ? 800 : 600}" fill="${labelColor}">${escapeHtml(row.rank)}</text>`;
        svg += `<text x="78" y="${y + 4}" font-size="13" font-weight="${row.virtual ? 800 : 600}" fill="${labelColor}">${escapeHtml(row.company)}</text>`;
        if (row.virtual) {
          svg += `<rect x="${margin.left}" y="${barY}" width="${round(x(row.low) - margin.left, 2)}" height="16" rx="3" fill="${escapeHtml(fill)}"></rect>`;
          svg += `<rect x="${round(x(row.low), 2)}" y="${barY}" width="${round(x(row.high) - x(row.low), 2)}" height="16" rx="3" fill="${escapeHtml(transparent("#c9a85b", 0.28))}" stroke="${escapeHtml(color)}" stroke-width="1" stroke-dasharray="3 3"></rect>`;
        } else {
          svg += `<rect x="${margin.left}" y="${barY}" width="${round(x(row.high) - margin.left, 2)}" height="16" rx="3" fill="${escapeHtml(fill)}"></rect>`;
        }
        svg += `<text x="${round(x(row.high) + 8, 2)}" y="${y + 4}" font-size="13" font-weight="800" fill="${labelColor}">${escapeHtml(row.valueText)}</text>`;
      });
      svg += `</svg>`;
      return svg;
    }

    function renderSvgChart(model) {
      const width = 900;
      const hasEvents = Array.isArray(model.events) && model.events.length > 0;
      const hasEventBands = Array.isArray(model.eventBands) && model.eventBands.length > 0;
      const hasEventOverlay = hasEvents || hasEventBands;
      const height = hasEventOverlay ? 390 : 320;
      const labels = model.labels;
      const hasY2 = model.datasets.some(dataset => dataset.yAxisID === "y2");
      const margin = { top: hasEvents ? 102 : (hasEventBands ? 70 : 20), right: hasY2 ? 118 : 64, bottom: 58, left: 64 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const x = index => labels.length <= 1
        ? margin.left + plotWidth / 2
        : margin.left + index / (labels.length - 1) * plotWidth;
      const yDatasets = model.datasets.filter(dataset => (dataset.yAxisID || "y") === "y");
      const y1Datasets = model.datasets.filter(dataset => dataset.yAxisID === "y1");
      const y2Datasets = model.datasets.filter(dataset => dataset.yAxisID === "y2");
      const yScale = makeScale(yDatasets, model.bar);
      const y1Scale = makeScale(y1Datasets, false);
      const y2Scale = makeScale(y2Datasets, false);
      const y = (value, scale) => margin.top + (scale.max - value) / (scale.max - scale.min) * plotHeight;
      const ticks = makeTicks(yScale);
      const xTicks = hasEvents ? makeMonthTicks(labels) : makeXTicks(labels);
      const tickFontSize = hasEventOverlay ? 12 : 11;
      const legendFontSize = hasEventOverlay ? 13 : 12;
      let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="100%" role="img" aria-label="${escapeHtml(model.spec.title)}">`;
      svg += `<rect x="0" y="0" width="${width}" height="${height}" fill="#ffffff"></rect>`;
      if (hasEventBands) {
        svg += renderSvgEventBands(model.eventBands, labels, x, margin, width, height);
      }
      for (const tick of ticks) {
        const yy = y(tick, yScale);
        svg += `<line x1="${margin.left}" y1="${yy}" x2="${width - margin.right}" y2="${yy}" stroke="${REPORT_GRID_COLOR}" stroke-width="0.8" stroke-dasharray="2 5"></line>`;
        svg += `<text x="${margin.left - 8}" y="${yy + 4}" text-anchor="end" font-size="${tickFontSize}" fill="${REPORT_TICK_COLOR}">${escapeHtml(model.plainYAxis ? formatNumber(tick) : compactNumber(tick))}</text>`;
      }
      svg += `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" stroke="${REPORT_AXIS_COLOR}"></line>`;
      svg += `<line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="${REPORT_AXIS_COLOR}"></line>`;
      if (y1Datasets.length) {
        for (const tick of makeTicks(y1Scale)) {
          const yy = y(tick, y1Scale);
          svg += `<text x="${width - margin.right + 8}" y="${yy + 4}" text-anchor="start" font-size="${tickFontSize}" fill="${REPORT_TICK_COLOR}">${escapeHtml(compactNumber(tick))}</text>`;
        }
        svg += `<line x1="${width - margin.right}" y1="${margin.top}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="${REPORT_AXIS_COLOR}"></line>`;
      }
      if (y2Datasets.length) {
        const axisX = width - margin.right + 54;
        for (const tick of makeTicks(y2Scale)) {
          const yy = y(tick, y2Scale);
          svg += `<text x="${axisX + 8}" y="${yy + 4}" text-anchor="start" font-size="${tickFontSize}" fill="${REPORT_TICK_COLOR}">${escapeHtml(compactNumber(tick))}</text>`;
        }
        svg += `<line x1="${axisX}" y1="${margin.top}" x2="${axisX}" y2="${height - margin.bottom}" stroke="${REPORT_AXIS_COLOR}"></line>`;
      }
      for (const tick of xTicks) {
        svg += `<text x="${x(tick.index)}" y="${height - margin.bottom + 22}" text-anchor="middle" font-size="${tickFontSize}" fill="${REPORT_TICK_COLOR}">${escapeHtml(shortDateLabel(tick.label))}</text>`;
      }
      const barDatasets = model.datasets.filter(dataset => dataset.type === "bar");
      model.datasets.forEach((dataset, datasetIndex) => {
        const scale = dataset.yAxisID === "y2" ? y2Scale : (dataset.yAxisID === "y1" ? y1Scale : yScale);
        const color = Array.isArray(dataset.borderColor) ? dataset.borderColor[0] : (dataset.borderColor || COLORS[datasetIndex % COLORS.length]);
        if (dataset.type === "bar") {
          const barIndex = Math.max(0, barDatasets.indexOf(dataset));
          const groupWidth = Math.max(12, Math.min(52, plotWidth / Math.max(labels.length, 1) * 0.72));
          const barWidth = Math.max(4, groupWidth / Math.max(barDatasets.length, 1) - 2);
          const offset = (barIndex - (barDatasets.length - 1) / 2) * (barWidth + 2);
          dataset.data.forEach((value, index) => {
            if (!Number.isFinite(value)) return;
            const itemColor = Array.isArray(dataset.borderColor) ? dataset.borderColor[index] : color;
            const itemFill = Array.isArray(dataset.backgroundColor) ? dataset.backgroundColor[index] : (dataset.backgroundColor || transparent(itemColor, 0.35));
            const zeroY = y(Math.max(0, scale.min), scale);
            const valueY = y(value, scale);
            svg += `<rect x="${x(index) + offset - barWidth / 2}" y="${Math.min(zeroY, valueY)}" width="${barWidth}" height="${Math.max(1, Math.abs(zeroY - valueY))}" fill="${escapeHtml(itemFill)}" stroke="${escapeHtml(itemColor)}" stroke-width="0.5"></rect>`;
          });
        } else {
          const segments = lineSegments(dataset.data, x, value => y(value, scale));
          const dash = Array.isArray(dataset.borderDash) && dataset.borderDash.length ? ` stroke-dasharray="${dataset.borderDash.join(" ")}"` : "";
          const widthValue = dataset.borderWidth || 2.4;
          for (const segment of segments) {
            svg += `<path d="${segment}" fill="none" stroke="${escapeHtml(color)}" stroke-width="${widthValue}"${dash} stroke-linejoin="round" stroke-linecap="round"></path>`;
          }
        }
      });
      if (hasEvents) {
        svg += renderSvgEvents(model.events, labels, model.datasets[0], x, value => y(value, yScale), margin, width, height);
      }
      if (hasEventBands) {
        svg += renderSvgBandLabels(model.eventBands, labels, x, margin, width, height);
        svg += renderSvgEndReturn(model, labels, model.datasets[0], x, value => y(value, yScale), margin, width);
      }
      if (hasEventBands) {
        svg += renderSvgBandLegend(model, margin);
        svg += `</svg>`;
        return svg;
      }
      const legendY = height - 18;
      let legendX = margin.left;
      model.datasets.forEach((dataset, index) => {
        const color = Array.isArray(dataset.borderColor) ? dataset.borderColor[0] : (dataset.borderColor || COLORS[index % COLORS.length]);
        const label = dataset.label || `Series ${index + 1}`;
        if (dataset.type === "line") {
          if (Array.isArray(dataset.borderDash) && dataset.borderDash.length) {
            svg += `<text x="${legendX}" y="${legendY}" font-size="${legendFontSize}" font-weight="800" fill="${escapeHtml(color)}">- - -</text>`;
          } else {
            svg += `<line x1="${legendX}" y1="${legendY - 4}" x2="${legendX + 22}" y2="${legendY - 4}" stroke="${escapeHtml(color)}" stroke-width="${dataset.borderWidth || 2.4}" stroke-linecap="round"></line>`;
          }
          svg += `<text x="${legendX + 34}" y="${legendY}" font-size="${legendFontSize}" fill="${REPORT_TEXT_COLOR}">${escapeHtml(label)}</text>`;
          legendX += Math.max(104, label.length * (legendFontSize * 0.68) + 46);
        } else {
          svg += `<rect x="${legendX}" y="${legendY - 10}" width="12" height="12" fill="${escapeHtml(color)}"></rect>`;
          svg += `<text x="${legendX + 18}" y="${legendY}" font-size="${legendFontSize}" fill="${REPORT_TEXT_COLOR}">${escapeHtml(label)}</text>`;
          legendX += Math.max(92, label.length * (legendFontSize * 0.68) + 34);
        }
      });
      svg += `</svg>`;
      return svg;
    }

    function renderSvgEventBands(bands, labels, x, margin, width, height) {
      let svg = "";
      const bottomY = height - margin.bottom;
      for (const band of bands) {
        const startIndex = indexOnOrAfter(labels, band.start);
        const endIndex = indexOnOrBefore(labels, band.end);
        if (startIndex < 0 || endIndex < startIndex) continue;
        const step = labels.length > 1 ? Math.abs(x(1) - x(0)) : 0;
        const x1 = Math.max(margin.left, x(startIndex) - step / 2);
        const x2 = Math.min(width - margin.right, x(endIndex) + step / 2);
        const fill = transparent(band.color || "#c00000", band.opacity ?? 0.14);
        svg += `<rect x="${round(x1, 2)}" y="${margin.top}" width="${round(Math.max(1, x2 - x1), 2)}" height="${round(bottomY - margin.top, 2)}" fill="${escapeHtml(fill)}" stroke="${escapeHtml(transparent(band.color || "#c00000", 0.32))}" stroke-width="0.8"></rect>`;
      }
      return svg;
    }

    function renderSvgBandLabels(bands, labels, x, margin, width, height) {
      let svg = "";
      const bottomY = height - margin.bottom;
      for (const band of bands) {
        const startIndex = indexOnOrAfter(labels, band.start);
        const endIndex = indexOnOrBefore(labels, band.end);
        if (startIndex < 0 || endIndex < startIndex) continue;
        const centerX = (x(startIndex) + x(endIndex)) / 2;
        const lines = band.lines || [band.detail || band.label];
        const textY = band.color === "#c9a85b" ? bottomY - 38 : margin.top + 20;
        lines.forEach((line, lineIndex) => {
          svg += `<text x="${round(clamp(centerX, margin.left + 70, width - margin.right - 70), 2)}" y="${round(textY + lineIndex * 15, 2)}" text-anchor="middle" font-size="11" font-weight="700" fill="${escapeHtml(band.color || MAIN_LINE_COLOR)}">${escapeHtml(line)}</text>`;
        });
      }
      return svg;
    }

    function renderSvgBandLegend(model, margin) {
      const legendX = margin.left + 10;
      let y = 20;
      let svg = `<line x1="${legendX}" y1="${y}" x2="${legendX + 34}" y2="${y}" stroke="${MAIN_LINE_COLOR}" stroke-width="3" stroke-linecap="round"></line>`;
      svg += `<text x="${legendX + 46}" y="${y + 5}" font-size="14" fill="${REPORT_TEXT_COLOR}">${escapeHtml(model.datasets[0]?.label || "SPY")}</text>`;
      y += 24;
      for (const band of model.eventBands || []) {
        svg += `<rect x="${legendX}" y="${y - 10}" width="34" height="14" fill="${escapeHtml(transparent(band.color || "#c00000", band.opacity ?? 0.14))}" stroke="${escapeHtml(transparent(band.color || "#c00000", 0.32))}" stroke-width="0.8"></rect>`;
        svg += `<text x="${legendX + 46}" y="${y + 2}" font-size="14" fill="${REPORT_TEXT_COLOR}">${escapeHtml(band.label)}</text>`;
        y += 22;
      }
      return svg;
    }

    function renderSvgEndReturn(model, labels, dataset, x, y, margin, width) {
      const data = dataset?.data || [];
      const index = data.length - 1;
      if (index < 0 || !Number.isFinite(data[index])) return "";
      const pointX = x(index);
      const pointY = y(data[index]);
      const label = `${model.endReturnPct >= 0 ? "+" : ""}${formatNumber(model.endReturnPct)}%`;
      const labelX = clamp(pointX - 96, margin.left + 10, width - margin.right - 86);
      const labelY = clamp(pointY - 18, margin.top + 18, pointY + 28);
      let svg = `<circle cx="${round(pointX, 2)}" cy="${round(pointY, 2)}" r="6" fill="#c00000" stroke="#ffffff" stroke-width="2"></circle>`;
      svg += `<text x="${round(labelX, 2)}" y="${round(labelY, 2)}" font-size="18" font-weight="800" fill="#c00000">${escapeHtml(label)}</text>`;
      return svg;
    }

    function indexOnOrAfter(labels, date) {
      return labels.findIndex(label => label >= date);
    }

    function indexOnOrBefore(labels, date) {
      for (let index = labels.length - 1; index >= 0; index -= 1) {
        if (labels[index] <= date) return index;
      }
      return -1;
    }

    function renderSvgEvents(events, labels, dataset, x, y, margin, width, height) {
      const data = dataset?.data || [];
      let svg = "";
      for (const event of events) {
        const index = labels.indexOf(event.date);
        if (index < 0 || !Number.isFinite(data[index])) continue;
        const pointX = x(index);
        const pointY = y(data[index]);
        const boxWidth = event.width || 180;
        const boxHeight = 38 + event.lines.length * 20;
        const boxX = clamp(pointX + (event.xOffset || 0), margin.left + 4, width - margin.right - boxWidth - 4);
        const boxY = clamp(event.boxY ?? 16, 8, height - margin.bottom - boxHeight - 8);
        const anchorY = boxY > pointY ? boxY : boxY + boxHeight;
        const anchorX = clamp(pointX, boxX + 16, boxX + boxWidth - 16);
        svg += `<line x1="${round(pointX, 2)}" y1="${round(pointY, 2)}" x2="${round(anchorX, 2)}" y2="${round(anchorY, 2)}" stroke="${MAIN_LINE_COLOR}" stroke-width="0.9"></line>`;
        svg += `<circle cx="${round(pointX, 2)}" cy="${round(pointY, 2)}" r="5.2" fill="${MAIN_LINE_COLOR}" stroke="#ffffff" stroke-width="2"></circle>`;
        svg += `<rect x="${round(boxX, 2)}" y="${round(boxY, 2)}" width="${boxWidth}" height="${boxHeight}" rx="5" fill="#ffffff" stroke="${MAIN_LINE_COLOR}" stroke-width="0.9"></rect>`;
        svg += `<text x="${round(boxX + 12, 2)}" y="${round(boxY + 22, 2)}" font-size="15" font-weight="700" fill="${MAIN_LINE_COLOR}">${escapeHtml(event.displayDate || shortDateLabel(event.date))}</text>`;
        event.lines.forEach((line, lineIndex) => {
          const textX = boxX + (lineIndex === 0 ? 12 : 24);
          const prefix = lineIndex === 0 ? "• " : "";
          svg += `<text x="${round(textX, 2)}" y="${round(boxY + 44 + lineIndex * 19, 2)}" font-size="14" fill="${MAIN_LINE_COLOR}">${escapeHtml(prefix + line)}</text>`;
        });
      }
      return svg;
    }

    function makeScale(datasets, includeZero) {
      const values = datasets.flatMap(dataset => dataset.data).filter(Number.isFinite);
      if (!values.length) return { min: 0, max: 1 };
      let min = Math.min(...values);
      let max = Math.max(...values);
      if (includeZero) {
        min = Math.min(min, 0);
        max = Math.max(max, 0);
      }
      if (min === max) {
        const pad = Math.abs(min || 1) * 0.1;
        min -= pad;
        max += pad;
      } else {
        const pad = (max - min) * 0.08;
        min -= pad;
        max += pad;
      }
      return { min, max };
    }

    function makeTicks(scale) {
      const ticks = [];
      for (let i = 0; i <= 4; i += 1) {
        ticks.push(scale.min + (scale.max - scale.min) * i / 4);
      }
      return ticks;
    }

    function makeXTicks(labels) {
      if (!labels.length) return [];
      const count = Math.min(6, labels.length);
      const ticks = [];
      for (let i = 0; i < count; i += 1) {
        const index = count === 1 ? 0 : Math.round(i * (labels.length - 1) / (count - 1));
        ticks.push({ index, label: labels[index] });
      }
      return ticks;
    }

    function makeMonthTicks(labels) {
      const seen = new Set();
      const ticks = [];
      labels.forEach((label, index) => {
        const month = String(label).slice(0, 7);
        if (seen.has(month)) return;
        seen.add(month);
        ticks.push({ index, label });
      });
      return ticks;
    }

    function lineSegments(data, x, y) {
      const segments = [];
      let current = "";
      data.forEach((value, index) => {
        if (!Number.isFinite(value)) {
          if (current) segments.push(current);
          current = "";
          return;
        }
        const command = current ? "L" : "M";
        current += `${command}${round(x(index), 2)},${round(y(value), 2)} `;
      });
      if (current) segments.push(current);
      return segments;
    }

    function renderDataTable(rows) {
      if (!rows.length) return `<details class="data-detail"><summary>원천 데이터 보기</summary><div class="empty-state">선택 기간에 표시 가능한 원천 데이터가 없습니다.</div></details>`;
      const headers = Object.keys(rows[0]);
      const head = headers.map(header => `<th>${escapeHtml(header)}</th>`).join("");
      const body = rows.map(row => `<tr>${headers.map(header => `<td>${escapeHtml(formatCell(row[header]))}</td>`).join("")}</tr>`).join("");
      return `
        <details class="data-detail">
          <summary>원천 데이터 보기 (${rows.length}행)</summary>

              <thead><tr>${head}</tr></thead>
              <tbody>${body}</tbody>
            </table>

      `;
    }

    function selectSeries(key, columns) {
      const dataset = state.datasets.get(key);
      const label = DATASETS[key].label;
      if (!dataset) return { ok: false, reason: `${label} 파일이 업로드되지 않았습니다.` };
      if (dataset.invalid) return { ok: false, reason: `${label} 파일이 Invalid 처리되었습니다: ${dataset.invalidReason}` };
      const column = resolveColumn(dataset.headers, columns);
      if (!column) return { ok: false, reason: `${label}에서 ${columns.join(" 또는 ")} 컬럼을 찾지 못했습니다.` };
      const rows = filteredRows(dataset).filter(row => Number.isFinite(row.values[column]));
      if (!rows.length) return { ok: false, reason: `${label}의 선택 기간에 유효한 ${column} 값이 없습니다.` };
      return { ok: true, dataset, column, rows };
    }

    function filteredRows(dataset) {
      if (state.periodMode === "all") return dataset.rows;
      return rowsForPeriod(dataset, state.periodMode);
    }

    function filterRowsByCutoff(rows) {
      return rows.filter(row => !row.dateIso || row.dateIso <= DATA_CUTOFF_DATE);
    }

    function rowsForPeriod(dataset, mode) {
      if (mode === "all") return dataset.rows;
      const rows = dataset.rows.filter(row => row.date instanceof Date && !Number.isNaN(row.date.getTime()));
      if (!rows.length) return [];
      const latest = rows.reduce((max, row) => row.date > max ? row.date : max, rows[0].date);
      const months = PERIOD_OPTIONS[mode]?.months ?? 1;
      const start = addMonthsUtc(latest, -months);
      return dataset.rows.filter(row => {
        const time = row.date.getTime();
        return time >= start.getTime() && time <= latest.getTime();
      });
    }

    function addMonthsUtc(date, months) {
      const next = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
      next.setUTCMonth(next.getUTCMonth() + months);
      return next;
    }

    function resolveColumn(headers, candidates) {
      const normalized = headers.map(header => ({ header, normalized: normalizeHeader(header) }));
      for (const candidate of candidates) {
        const target = normalizeHeader(candidate);
        const exact = normalized.find(item => item.normalized === target);
        if (exact) return exact.header;
      }
      for (const candidate of candidates) {
        const target = normalizeHeader(candidate);
        const partial = normalized.find(item => item.normalized.includes(target) || target.includes(item.normalized));
        if (partial) return partial.header;
      }
      return null;
    }

    function computeReturn(key, columns, mode = state.periodMode, minStartDate = null, allowShortWindow = false) {
      const dataset = state.datasets.get(key);
      const label = DATASETS[key].label;
      if (!dataset) return { ok: false, reason: `${label} 파일이 업로드되지 않았습니다.` };
      if (dataset.invalid) return { ok: false, reason: `${label} 파일이 Invalid 처리되었습니다: ${dataset.invalidReason}` };
      const column = resolveColumn(dataset.headers, columns);
      if (!column) return { ok: false, reason: `${label}에서 ${columns.join(" 또는 ")} 컬럼을 찾지 못했습니다.` };
      const rows = rowsForPeriod(dataset, mode)
        .filter(row => !minStartDate || row.date >= minStartDate)
        .filter(row => Number.isFinite(row.values[column]));
      if (rows.length < 2) return { ok: false, reason: `${DATASETS[key].label} 수익률 계산에는 최소 2개 값이 필요합니다.` };
      const first = rows[0];
      const last = rows[rows.length - 1];
      if (mode !== "all" && !allowShortWindow) {
        const requiredStart = addMonthsUtc(last.date, -(PERIOD_OPTIONS[mode]?.months ?? 1));
        requiredStart.setUTCDate(requiredStart.getUTCDate() + 10);
        if (first.date > requiredStart) {
          return { ok: false, reason: `${DATASETS[key].label}의 ${PERIOD_OPTIONS[mode]?.label || mode} 비교 기간을 채울 데이터가 없습니다.` };
        }
      }
      const firstValue = first.values[column];
      const lastValue = last.values[column];
      if (!Number.isFinite(firstValue) || firstValue === 0 || !Number.isFinite(lastValue)) {
        return { ok: false, reason: `${DATASETS[key].label} 수익률 계산값이 유효하지 않습니다.` };
      }
      return {
        ok: true,
        key,
        assetName: DATASETS[key].label,
        column,
        firstDate: first.dateIso,
        firstValue: round(firstValue, 6),
        lastDate: last.dateIso,
        lastValue: round(lastValue, 6),
        returnPct: round((lastValue / firstValue - 1) * 100, 4),
        sourceFile: dataset.fileName
      };
    }

    function collectDates(rowGroups) {
      return unique(rowGroups.flat().map(row => row.dateIso)).sort();
    }

    function tableRowsFromSeries(labels, series, valueFactory) {
      return labels.map(date => {
        const row = { Date: date };
        for (const item of series) {
          const source = item.rows.find(candidate => candidate.dateIso === date);
          const value = source ? (valueFactory ? valueFactory(item)(source) : source.values[item.column]) : "";
          row[item.label] = value;
        }
        return row;
      });
    }

    function peBandComment(rows, priceColumn, bands) {
      const latest = [...rows].reverse().find(row => Number.isFinite(row.values[priceColumn]));
      if (!latest) return "";
      const price = latest.values[priceColumn];
      const bandValues = bands
        .map(band => ({ label: band.label, value: latest.values[band.column] }))
        .filter(item => Number.isFinite(item.value))
        .sort((a, b) => b.value - a.value);
      if (!bandValues.length) return "";
      if (price >= bandValues[0].value) return `자동 코멘트: ${latest.dateIso} 현재 가격은 최상단 밴드(${bandValues[0].label}) 이상에 위치합니다.`;
      if (price <= bandValues[bandValues.length - 1].value) return `자동 코멘트: ${latest.dateIso} 현재 가격은 최하단 밴드(${bandValues[bandValues.length - 1].label}) 이하에 위치합니다.`;
      for (let index = 0; index < bandValues.length - 1; index += 1) {
        const upper = bandValues[index];
        const lower = bandValues[index + 1];
        if (price <= upper.value && price >= lower.value) {
          return `자동 코멘트: ${latest.dateIso} 현재 가격은 ${upper.label}와 ${lower.label} 사이에 위치합니다.`;
        }
      }
      return "";
    }

    function registerMissing(section, missingData, requiredColumns, suggestedSource, reasonNeeded, priority) {
      state.missingRequests.push({
        section,
        missing_data: missingData,
        required_columns: requiredColumns || "Date, Value",
        suggested_source: suggestedSource || "Bloomberg",
        reason_needed: reasonNeeded || "차트 생성에 필요한 데이터가 없습니다.",

      el.periodOneYear.classList.toggle("active", mode === "1y");
      el.periodAll.classList.toggle("active", mode === "all");

    }

    function periodLabel() {

    function destroyCharts() {
      for (const chart of state.chartInstances.values()) chart.destroy();
      state.chartInstances.clear();
